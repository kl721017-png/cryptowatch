<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoWatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2f5;color:#1a2233;font-family:'DM Mono','Courier New',monospace;font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#c0cce0;border-radius:2px}
.card{background:#fff;border:1px solid #dde3ee;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rh:hover{background:#f5f7fa!important;cursor:default}
.btn{cursor:pointer;border:none;font-family:'DM Mono',monospace;border-radius:8px;transition:all .15s;font-size:12px}
.btn:hover{filter:brightness(.95);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
input,select{background:#fff;border:1px solid #c8d4e8;color:#1a2233;border-radius:8px;padding:9px 13px;font-family:'DM Mono',monospace;font-size:13px;outline:none;width:100%}
input:focus,select:focus{border-color:#3a8fff;box-shadow:0 0 0 3px rgba(50,140,255,.1)}
select option{background:#fff;color:#1a2233}
@keyframes fadeUp{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes wakePulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadein{animation:fadeUp .2s ease both}
.blink{animation:blink 1.5s infinite}
.wake{animation:wakePulse 2s infinite}
.spin{display:inline-block;animation:spin .8s linear infinite}
header{background:#fff;border-bottom:1px solid #dde3ee;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);position:sticky;top:0;z-index:100}
.tabs{background:#fff;border-bottom:1px solid #dde3ee;padding:5px 18px;display:flex;gap:2px;position:sticky;top:57px;z-index:99}
.tab-btn{cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.5px;padding:8px 18px;border-radius:8px;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab-btn.active{color:#1a2233;background:#edf0f7;font-weight:500}
.tab-btn:not(.active){color:#7a8aaa}
.badge{background:#e8445a;color:#fff;font-size:9px;padding:1px 6px;border-radius:10px}
.content{padding:20px 24px}
.tf-pills{display:flex;gap:3px;background:#edf0f7;border:1px solid #dde3ee;border-radius:10px;padding:3px}
.tf-pill{cursor:pointer;border:none;font-family:'DM Mono',monospace;font-size:11px;padding:5px 14px;border-radius:8px;transition:all .15s}
.tf-pill.active{background:#fff;color:#2255cc;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tf-pill:not(.active){background:transparent;color:#7a8aaa}
.market-grid{display:grid;grid-template-columns:150px 120px 80px 1fr 1fr 130px 36px;gap:8px;padding:12px 20px;align-items:center;transition:background .15s;border-bottom:1px solid #edf0f7}
.market-head{font-size:10px;color:#8898bb;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #edf0f7!important;background:#fafbfd}
.gauge-wrap{display:flex;flex-direction:column;gap:4px}
.gauge-bar-bg{height:5px;background:#e8ecf5;border-radius:3px;overflow:hidden}
.gauge-bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.di-wrap{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.di-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:500}
.alert-row{border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;border:1px solid #dde3ee;background:#fff}
.log-row{background:#fff;border:1px solid #dde3ee;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
.status-bar{padding:10px 24px;font-size:12px;border-bottom:1px solid;font-weight:500}
.coin-tag{display:inline-flex;align-items:center;gap:6px;background:#edf0f7;border:1px solid #dde3ee;border-radius:20px;padding:4px 10px 4px 8px;font-size:12px;color:#1a2233;font-weight:500}
.search-result{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f2f5;transition:background .1s;font-size:13px}
.search-result:hover{background:#f0f4ff}
.search-result:last-child{border-bottom:none}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-family:Syne,sans-serif;font-weight:800;font-size:20px;background:linear-gradient(90deg,#2255cc,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent">◈ CRYPTOWATCH</span>
    <span id="sync-badge" style="font-size:10px;color:#7a8aaa;background:#f0f2f5;border:1px solid #dde3ee;padding:2px 10px;border-radius:20px">啟動中…</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="btn" id="line-test-btn" onclick="testLine()" style="font-size:11px;padding:6px 14px;border-radius:20px;background:#edfaf4;color:#1a7a4a;border:1px solid #a8dfc3">📲 測試 LINE</button>
    <button class="btn" id="wake-btn" onclick="toggleWake()" style="font-size:11px;padding:6px 14px;border-radius:20px;background:#fffae8;color:#8a6200;border:1px solid #f0d980">💤 防止休眠</button>
    <button class="btn" onclick="refreshAll()" style="background:#edf0f7;color:#4a5a7a;padding:7px 13px;font-size:14px;border:1px solid #dde3ee">↻</button>
  </div>
</header>
<div id="status-bar" style="display:none" class="status-bar"></div>
<div class="tabs">
  <button class="tab-btn active" id="tab-market" onclick="switchTab('market')">市場概覽</button>
  <button class="tab-btn" id="tab-coins" onclick="switchTab('coins')">幣種管理</button>
  <button class="tab-btn" id="tab-alerts" onclick="switchTab('alerts')">警報設定 <span class="badge" id="alert-badge" style="display:none">0</span></button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')">觸發記錄 <span class="badge" id="log-badge" style="display:none">0</span></button>
</div>
<div id="page-market" class="content">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:#7a8aaa;letter-spacing:1px;text-transform:uppercase">K線週期</span>
      <div class="tf-pills">
        <button class="tf-pill active" id="tf-1H" onclick="setViewTf('1H')">1小時</button>
        <button class="tf-pill" id="tf-4H" onclick="setViewTf('4H')">4小時</button>
        <button class="tf-pill" id="tf-1D" onclick="setViewTf('1D')">日線</button>
      </div>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8aaa"><div style="width:8px;height:8px;border-radius:50%;background:#e8445a"></div>RSI&gt;70 超買</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8aaa"><div style="width:8px;height:8px;border-radius:50%;background:#11a86a"></div>RSI&lt;30 超賣</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8aaa"><div style="width:8px;height:8px;border-radius:50%;background:#7c3aed"></div>ADX&gt;25 趨勢</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#7a8aaa"><div style="width:8px;height:8px;border-radius:50%;background:#c0cce0"></div>ADX&lt;20 盤整</div>
    </div>
  </div>
  <div class="card" style="overflow:hidden">
    <div class="market-grid market-head">
      <span>幣種</span><span style="text-align:right">價格</span><span style="text-align:right">24h</span>
      <span style="padding-left:8px" id="rsi-head">RSI (1H)</span>
      <span style="padding-left:8px" id="adx-head">ADX (1H)</span>
      <span style="text-align:right">成交量</span><span></span>
    </div>
    <div id="market-rows"><div style="padding:40px;text-align:center;color:#aab8cc">載入中，請稍候…</div></div>
  </div>
  <div style="font-size:10px;color:#aab8cc;margin-top:10px;text-align:right">資料來源：CryptoCompare API · 價格每30秒 · 指標每5分鐘更新</div>
</div>
<div id="page-coins" class="content" style="display:none;max-width:680px">
  <div style="font-size:11px;color:#7a8aaa;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px">幣種管理（最多 20 個）</div>
  <div class="card" style="padding:20px;margin-bottom:20px">
    <div style="font-size:12px;color:#2255cc;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">新增幣種</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="position:relative;flex:1">
        <input type="text" id="coin-search-input" placeholder="輸入幣種代號，例如：PEPE、LINK、UNI" oninput="onCoinSearch()" onkeydown="if(event.key==='Enter')searchCoin()">
        <div id="search-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #dde3ee;border-radius:10px;margin-top:4px;z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1)"></div>
      </div>
      <button class="btn" onclick="searchCoin()" id="search-btn" style="background:linear-gradient(90deg,#2255cc,#3a70ee);color:#fff;padding:9px 18px;white-space:nowrap;font-weight:500">搜尋</button>
    </div>
    <div id="search-status" style="font-size:11px;color:#7a8aaa;min-height:18px"></div>
  </div>
  <div class="card" style="padding:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:12px;color:#1a2233;font-weight:600">目前追蹤幣種 <span id="coin-count" style="color:#7a8aaa;font-weight:400">(0/20)</span></div>
      <button class="btn" onclick="resetCoins()" style="background:#fef0f0;color:#cc2233;border:1px solid #f0c0c4;padding:4px 12px;font-size:11px">重置預設</button>
    </div>
    <div id="coin-list" style="display:flex;flex-wrap:wrap;gap:8px"><span style="color:#aab8cc;font-size:12px">載入中…</span></div>
  </div>
  <div style="font-size:11px;color:#aab8cc;margin-top:12px;line-height:1.8">💡 輸入幣種代號後點搜尋，從結果中選擇即可加入。幣種和警報資料存在瀏覽器，重新整理後不會消失。</div>
</div>
<div id="page-alerts" class="content" style="display:none;max-width:700px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-size:11px;color:#7a8aaa;text-transform:uppercase;letter-spacing:1px" id="alert-count">監控中 0 / 0</span>
    <button class="btn" id="add-btn" onclick="toggleForm()" style="background:linear-gradient(90deg,#2255cc,#3a70ee);color:#fff;padding:8px 18px;font-weight:500">+ 新增警報</button>
  </div>
  <div id="alert-form" class="card fadein" style="display:none;padding:20px;margin-bottom:16px">
    <div style="font-size:11px;color:#2255cc;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase;font-weight:600">設定新警報</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <select id="form-coin"></select>
      <select id="form-type" onchange="updateFormHint()">
        <option value="price_above">價格高於</option>
        <option value="price_below">價格低於</option>
        <option value="price_change_up">24h 漲幅 ≥</option>
        <option value="price_change_down">24h 跌幅 ≥</option>
        <option value="rsi_above">RSI 高於</option>
        <option value="rsi_below" selected>RSI 低於</option>
        <option value="adx_above">ADX 高於</option>
        <option value="adx_below">ADX 低於</option>
      </select>
      <div id="tf-row">
        <div style="font-size:11px;color:#7a8aaa;margin-bottom:7px;font-weight:500">K線週期</div>
        <div class="tf-pills" style="display:inline-flex">
          <button class="tf-pill active" id="ftf-1H" onclick="setFormTf('1H')">1小時</button>
          <button class="tf-pill" id="ftf-4H" onclick="setFormTf('4H')">4小時</button>
          <button class="tf-pill" id="ftf-1D" onclick="setFormTf('1D')">日線</button>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <input type="number" id="form-value" placeholder="RSI 值（超賣 30 / 超買 70）" value="30" onkeydown="if(event.key==='Enter')addAlert()">
        <button class="btn" onclick="addAlert()" style="background:linear-gradient(90deg,#11a86a,#0d8a55);color:#fff;padding:9px 20px;font-weight:600;white-space:nowrap">確認新增</button>
      </div>
      <div id="form-hint" style="font-size:11px;color:#5a7aaa;line-height:1.7;background:#f5f8ff;border-left:3px solid #2255cc;padding:8px 12px;border-radius:0 8px 8px 0"></div>
    </div>
  </div>
  <div id="alert-list"></div>
</div>
<div id="page-log" class="content" style="display:none;max-width:700px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-size:11px;color:#7a8aaa;text-transform:uppercase;letter-spacing:1px" id="log-count">觸發記錄（0 筆）</span>
    <button class="btn" onclick="clearLog()" style="background:#edf0f7;color:#4a5a7a;padding:5px 12px;border:1px solid #dde3ee">清除</button>
  </div>
  <div id="log-list"><div style="text-align:center;color:#aab8cc;padding:48px 0">尚無觸發記錄</div></div>
</div>
<script>
var PROXY="https://line-proxy-c1em.onrender.com";
var MAX_COINS=20;
var DEFAULT_COINS=[
  {sym:"BTC",name:"Bitcoin"},
  {sym:"ETH",name:"Ethereum"},
  {sym:"SOL",name:"Solana"},
  {sym:"BNB",name:"BNB"},
  {sym:"XRP",name:"XRP"},
];
var COIN_COLORS=["#f7931a","#627eea","#9945ff","#f3ba2f","#00aae4","#2775ca","#e84142","#e84393","#16c784","#0033ad","#ff0420","#26a17b","#c2a633","#6b8cff","#f09242","#1652f0","#00d4aa","#ff6b35","#7b61ff","#4CAF50"];
var AT=[
  {id:"price_above",label:"價格高於",unit:"$",color:"#11a86a"},
  {id:"price_below",label:"價格低於",unit:"$",color:"#e8445a"},
  {id:"price_change_up",label:"24h漲幅≥",unit:"%",color:"#2255cc"},
  {id:"price_change_down",label:"24h跌幅≥",unit:"%",color:"#e87722"},
  {id:"rsi_above",label:"RSI高於",unit:"",color:"#e8445a"},
  {id:"rsi_below",label:"RSI低於",unit:"",color:"#11a86a"},
  {id:"adx_above",label:"ADX高於",unit:"",color:"#7c3aed"},
  {id:"adx_below",label:"ADX低於",unit:"",color:"#e8a822"},
];
var coins=loadCoins(),prices={},rsiCache={},adxCache={};
var viewTf="1H",formTf="1H";
var alerts=loadAlerts(),log=loadLog();
var firedIds=new Set(alerts.filter(function(a){return a.fired;}).map(function(a){return a.id;}));
var wakeActive=false,wakeLock=null,formVisible=false,searchTimer=null,searchResults=[];

function loadCoins(){try{var s=localStorage.getItem("cw_coins3");return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_COINS));}catch(e){return JSON.parse(JSON.stringify(DEFAULT_COINS));}}
function saveCoins(){try{localStorage.setItem("cw_coins3",JSON.stringify(coins));}catch(e){}}
function loadAlerts(){try{var s=localStorage.getItem("cw_alerts3");return s?JSON.parse(s):[];}catch(e){return[];}}
function saveAlerts(){try{localStorage.setItem("cw_alerts3",JSON.stringify(alerts));}catch(e){}}
function loadLog(){try{var s=localStorage.getItem("cw_log3");return s?JSON.parse(s):[];}catch(e){return[];}}
function saveLog(){try{localStorage.setItem("cw_log3",JSON.stringify(log));}catch(e){}}

function calcRSI(closes,p){p=p||14;if(closes.length<p+1)return null;var ag=0,al=0,d,i;for(i=1;i<=p;i++){d=closes[i]-closes[i-1];if(d>=0)ag+=d;else al-=d;}ag/=p;al/=p;for(i=p+1;i<closes.length;i++){d=closes[i]-closes[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}if(al===0)return 100;return parseFloat((100-100/(1+ag/al)).toFixed(2));}
function calcADX(ohlc,p){p=p||14;if(ohlc.length<p*2+1)return null;var trs=[],pDMs=[],mDMs=[],i,h,l,ph,pl,pc,up,dn;for(i=1;i<ohlc.length;i++){h=ohlc[i][1];l=ohlc[i][2];pc=ohlc[i-1][3];ph=ohlc[i-1][1];pl=ohlc[i-1][2];trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));up=h-ph;dn=pl-l;pDMs.push(up>dn&&up>0?up:0);mDMs.push(dn>up&&dn>0?dn:0);}function w(a,p){var s=0,r=[],i;for(i=0;i<p;i++)s+=a[i];r.push(s);for(i=p;i<a.length;i++){s=s-s/p+a[i];r.push(s);}return r;}var sT=w(trs,p),sP=w(pDMs,p),sM=w(mDMs,p);var dx=sT.map(function(t,i){if(t===0)return 0;var pd=sP[i]/t*100,md=sM[i]/t*100;return Math.abs(pd-md)/(pd+md)*100;});var adxVal=0;for(i=dx.length-p;i<dx.length;i++)adxVal+=dx[i];adxVal=parseFloat((adxVal/p).toFixed(2));var last=sT.length-1;return{adx:adxVal,plusDI:parseFloat((sP[last]/sT[last]*100).toFixed(2)),minusDI:parseFloat((sM[last]/sT[last]*100).toFixed(2))};}

function fp(n){if(n==null)return"—";if(n>=1000)return"$"+n.toLocaleString("en-US",{maximumFractionDigits:2});if(n>=1)return"$"+n.toFixed(4);return"$"+n.toFixed(6);}
function fpct(n){if(n==null)return"—";return(n>=0?"+":"")+n.toFixed(2)+"%";}
function fvol(n){if(n==null)return"—";if(n>=1e9)return"$"+(n/1e9).toFixed(2)+"B";if(n>=1e6)return"$"+(n/1e6).toFixed(2)+"M";return"$"+n.toLocaleString();}
function rsiZ(v){if(v==null)return{l:"—",c:"#aab8cc"};if(v>=70)return{l:"超買",c:"#e8445a"};if(v<=30)return{l:"超賣",c:"#11a86a"};return{l:"中性",c:"#2255cc"};}
function adxZ(v){if(v==null)return{l:"—",c:"#aab8cc"};if(v>=50)return{l:"極強趨勢",c:"#5b21b6"};if(v>=25)return{l:"強趨勢",c:"#7c3aed"};if(v>=20)return{l:"弱趨勢",c:"#e8a822"};return{l:"無趨勢",c:"#aab8cc"};}
function beep(freq,dur){freq=freq||880;dur=dur||0.6;try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);}catch(e){}}

async function sendLine(msg){var r=await fetch(PROXY+"/notify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg})});if(!r.ok)throw new Error(r.status);}
async function testLine(){var btn=document.getElementById("line-test-btn");btn.textContent="傳送中…";btn.disabled=true;try{await sendLine("✅ CryptoWatch 測試成功！");btn.textContent="✓ LINE 正常";btn.style.cssText="font-size:11px;padding:6px 14px;border-radius:20px;background:#edfaf4;color:#1a7a4a;border:1px solid #a8dfc3";showStatus("✅ LINE 正常！請查看手機。","#1a7a4a","#edfaf4","#a8dfc3");}catch(e){btn.textContent="✗ 失敗 重試";btn.style.cssText="font-size:11px;padding:6px 14px;border-radius:20px;background:#fef0f0;color:#cc2233;border:1px solid #f0a0a8";showStatus("⚠ 失敗，請稍後重試。","#cc2233","#fef0f0","#f0a0a8");}btn.disabled=false;}
function showStatus(msg,color,bg,border){var s=document.getElementById("status-bar");s.style.display="block";s.style.color=color;s.style.background=bg;s.style.borderColor=border;s.textContent=msg;setTimeout(function(){s.style.display="none";},7000);}
async function toggleWake(){var btn=document.getElementById("wake-btn");if(wakeActive){await wakeLock.release();wakeActive=false;btn.innerHTML="💤 防止休眠";btn.style.cssText="font-size:11px;padding:6px 14px;border-radius:20px;background:#fffae8;color:#8a6200;border:1px solid #f0d980";}else{try{wakeLock=await navigator.wakeLock.request("screen");wakeActive=true;btn.innerHTML='<span class="wake">🟢 常亮中</span>';btn.style.cssText="font-size:11px;padding:6px 14px;border-radius:20px;background:#edfaf4;color:#1a7a4a;border:1px solid #a8dfc3";wakeLock.addEventListener("release",function(){wakeActive=false;btn.innerHTML="💤 防止休眠";btn.style.cssText="font-size:11px;padding:6px 14px;border-radius:20px;background:#fffae8;color:#8a6200;border:1px solid #f0d980";});}catch(e){btn.textContent="不支援";}}}
document.addEventListener("visibilitychange",function(){if(wakeActive&&!wakeLock)toggleWake();});

function switchTab(t){["market","coins","alerts","log"].forEach(function(id){document.getElementById("page-"+id).style.display=id===t?"block":"none";document.getElementById("tab-"+id).classList.toggle("active",id===t);});if(t==="coins")renderCoinList();if(t==="alerts")renderAlertFormCoins();}
function setViewTf(tf){viewTf=tf;["1H","4H","1D"].forEach(function(t){document.getElementById("tf-"+t).classList.toggle("active",t===tf);});document.getElementById("rsi-head").textContent="RSI ("+tf+")";document.getElementById("adx-head").textContent="ADX ("+tf+")";renderMarket();}
function setFormTf(tf){formTf=tf;["1H","4H","1D"].forEach(function(t){document.getElementById("ftf-"+t).classList.toggle("active",t===tf);});}

function onCoinSearch(){clearTimeout(searchTimer);var q=document.getElementById("coin-search-input").value.trim();document.getElementById("search-dropdown").style.display="none";if(q.length<1){document.getElementById("search-status").textContent="";return;}searchTimer=setTimeout(function(){searchCoin();},700);}
async function searchCoin(){
  var q=document.getElementById("coin-search-input").value.trim();
  if(!q){document.getElementById("search-status").textContent="請輸入幣種代號";return;}
  if(coins.length>=MAX_COINS){document.getElementById("search-status").textContent="已達上限 "+MAX_COINS+" 個";return;}
  var btn=document.getElementById("search-btn");btn.innerHTML='<span class="spin">↻</span>';btn.disabled=true;
  document.getElementById("search-status").textContent="搜尋中…";
  try{
    var r=await fetch(PROXY+"/search?query="+encodeURIComponent(q));
    var data=await r.json();
    searchResults=(data.coins||[]).slice(0,8);
    if(!searchResults.length){document.getElementById("search-status").textContent="找不到「"+q+"」";btn.innerHTML="搜尋";btn.disabled=false;return;}
    var dd=document.getElementById("search-dropdown");
    dd.innerHTML=searchResults.map(function(c,i){return'<div class="search-result" onclick="addCoinFromSearch('+i+')"><span style="font-weight:600;color:#1a2233">'+(c.symbol||"").toUpperCase()+'</span><span style="color:#7a8aaa;margin-left:8px">'+c.name+'</span></div>';}).join("");
    dd.style.display="block";
    document.getElementById("search-status").textContent="找到 "+searchResults.length+" 個結果，請選擇：";
  }catch(e){document.getElementById("search-status").textContent="搜尋失敗，請重試";}
  btn.innerHTML="搜尋";btn.disabled=false;
}
function addCoinFromSearch(idx){
  var c=searchResults[idx];if(!c)return;
  document.getElementById("search-dropdown").style.display="none";
  var sym=(c.symbol||"").toUpperCase();
  if(coins.find(function(x){return x.sym===sym;})){document.getElementById("search-status").textContent="「"+sym+"」已在清單中";return;}
  if(coins.length>=MAX_COINS){document.getElementById("search-status").textContent="已達上限 "+MAX_COINS+" 個";return;}
  coins.push({sym:sym,name:c.name});
  saveCoins();
  document.getElementById("coin-search-input").value="";
  document.getElementById("search-status").innerHTML='<span style="color:#11a86a">✓ 已新增 '+sym+' — '+c.name+'</span>';
  renderCoinList();renderAlertFormCoins();
  fetchKlines(sym,"1H");fetchKlines(sym,"4H");fetchKlines(sym,"1D");
  fetchPrices();
}
function removeCoin(sym){
  if(coins.length<=1){showStatus("至少保留一個幣種","#cc2233","#fef0f0","#f0a0a8");return;}
  coins=coins.filter(function(c){return c.sym!==sym;});
  alerts=alerts.filter(function(a){return a.sym!==sym;});
  saveCoins();saveAlerts();renderCoinList();renderAlertFormCoins();renderAlerts();renderMarket();
}
function resetCoins(){if(!confirm("確定要重置為預設幣種？"))return;coins=JSON.parse(JSON.stringify(DEFAULT_COINS));alerts=alerts.filter(function(a){return coins.find(function(c){return c.sym===a.sym;});});saveCoins();saveAlerts();renderCoinList();renderAlertFormCoins();renderAlerts();refreshAll();}
function renderCoinList(){
  document.getElementById("coin-count").textContent="("+coins.length+"/"+MAX_COINS+")";
  document.getElementById("coin-list").innerHTML=coins.map(function(c,i){var col=COIN_COLORS[i%COIN_COLORS.length];return'<div class="coin-tag"><div style="width:20px;height:20px;border-radius:50%;background:'+col+'22;border:1.5px solid '+col+'66;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:'+col+'">'+c.sym.slice(0,3)+'</div><span>'+c.sym+'</span><span style="color:#aab8cc;font-size:11px">'+c.name+'</span><button onclick="removeCoin(\''+c.sym+'\')" style="cursor:pointer;border:none;background:none;color:#cc2233;font-size:15px;padding:0;line-height:1;margin-left:2px">×</button></div>';}).join("")||"<span style='color:#aab8cc;font-size:12px'>尚無幣種</span>";
}
function renderAlertFormCoins(){var sel=document.getElementById("form-coin");if(!sel)return;var cur=sel.value;sel.innerHTML=coins.map(function(c){return'<option value="'+c.sym+'">'+c.sym+' — '+c.name+'</option>';}).join("");if(coins.find(function(c){return c.sym===cur;}))sel.value=cur;}

function renderMarket(){
  document.getElementById("market-rows").innerHTML=coins.map(function(coin,idx){
    var p=prices[coin.sym];
    var key=coin.sym+"_"+viewTf;
    var rsi=rsiCache[key],adxD=adxCache[key];
    var rz=rsiZ(rsi),az=adxZ(adxD?adxD.adx:null);
    var color=COIN_COLORS[idx%COIN_COLORS.length];
    var price=p?p.price:null,chg=p?p.change24h:null,vol=p?p.vol24h:null,up=chg>=0;
    var rsiHTML=rsi!=null?'<div class="gauge-wrap"><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;font-size:14px;color:'+rz.c+';min-width:38px">'+rsi+'</span><span style="font-size:10px;color:#fff;background:'+rz.c+';padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500">'+rz.l+'</span></div><div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:'+Math.min(100,rsi)+'%;background:'+rz.c+'"></div></div></div>':"<span style='color:#aab8cc;font-size:11px'>計算中…</span>";
    var adxHTML="<span style='color:#aab8cc;font-size:11px'>計算中…</span>";
    if(adxD){var bull=adxD.plusDI>adxD.minusDI;adxHTML='<div class="gauge-wrap"><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;font-size:14px;color:'+az.c+';min-width:38px">'+adxD.adx+'</span><span style="font-size:10px;color:#fff;background:'+az.c+';padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500">'+az.l+'</span></div><div class="gauge-bar-bg"><div class="gauge-bar-fill" style="width:'+Math.min(100,adxD.adx/80*100)+'%;background:'+az.c+'"></div></div><div class="di-wrap"><span class="di-badge" style="background:'+(bull?"#edfaf4":"#fef0f0")+';color:'+(bull?"#1a7a4a":"#cc2233")+'">+DI '+adxD.plusDI.toFixed(1)+'</span><span class="di-badge" style="background:'+(!bull?"#fef0f0":"#fff5e8")+';color:'+(!bull?"#cc2233":"#e87722")+'">−DI '+adxD.minusDI.toFixed(1)+'</span><span class="di-badge" style="background:#edf0f7;color:#4a5a7a">'+(bull?"↑ 多方":"↓ 空方")+'</span></div></div>';}
    return'<div class="market-grid rh"><div style="display:flex;align-items:center;gap:9px"><div style="width:32px;height:32px;border-radius:50%;background:'+color+'18;border:1.5px solid '+color+'55;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+color+';flex-shrink:0">'+coin.sym.slice(0,4)+'</div><div><div style="color:#1a2233;font-weight:600;font-size:13px">'+coin.sym+'</div><div style="font-size:10px;color:#aab8cc">'+coin.name+'</div></div></div><div style="text-align:right;font-weight:700;color:#1a2233;font-size:14px">'+(price!=null?fp(price):"<span class='blink' style='color:#dde3ee'>—</span>")+'</div><div style="text-align:right;font-size:12px;font-weight:600;color:'+(p?(up?"#11a86a":"#e8445a"):"#dde3ee")+'">'+(chg!=null?fpct(chg):"—")+'</div><div style="padding-left:8px">'+rsiHTML+'</div><div style="padding-left:8px">'+adxHTML+'</div><div style="text-align:right;font-size:11px;color:#7a8aaa">'+(vol!=null?fvol(vol):"—")+'</div><div style="text-align:center"><button onclick="removeCoin(\''+coin.sym+'\')" style="cursor:pointer;border:none;background:none;color:#dde3ee;font-size:18px;padding:0;line-height:1;transition:color .15s" onmouseover="this.style.color=\'#e8445a\'" onmouseout="this.style.color=\'#dde3ee\'">×</button></div></div>';
  }).join("")||"<div style='padding:40px;text-align:center;color:#aab8cc'>尚無追蹤幣種，請到「幣種管理」新增</div>";
}

function toggleForm(){formVisible=!formVisible;document.getElementById("alert-form").style.display=formVisible?"block":"none";var btn=document.getElementById("add-btn");btn.textContent=formVisible?"✕ 收起":"+ 新增警報";btn.style.background=formVisible?"#edf0f7":"linear-gradient(90deg,#2255cc,#3a70ee)";btn.style.color=formVisible?"#4a5a7a":"#fff";if(formVisible)updateFormHint();}
function updateFormHint(){var t=document.getElementById("form-type").value;document.getElementById("tf-row").style.display=(t.startsWith("rsi")||t.startsWith("adx"))?"block":"none";var hints={rsi_above:"RSI > 70 = 超買訊號。",rsi_below:"RSI < 30 = 超賣訊號。",adx_above:"ADX > 25 = 出現明顯趨勢。",adx_below:"ADX < 20 = 市場盤整。"};var ph={rsi_above:"RSI 值（超買通常 70）",rsi_below:"RSI 值（超賣通常 30）",adx_above:"ADX 值（趨勢通常 25）",adx_below:"ADX 值（盤整通常 20）",price_above:"價格，例如 100000",price_below:"價格，例如 80000",price_change_up:"百分比，例如 5",price_change_down:"百分比，例如 5"};document.getElementById("form-hint").textContent=hints[t]||"";document.getElementById("form-value").placeholder=ph[t]||"數值";}
function addAlert(){var sym=document.getElementById("form-coin").value,type=document.getElementById("form-type").value,val=document.getElementById("form-value").value;if(!val||isNaN(parseFloat(val)))return;var isInd=type.startsWith("rsi")||type.startsWith("adx");alerts.push({id:Date.now(),sym:sym,type:type,value:val,tf:isInd?formTf:null,fired:false});saveAlerts();renderAlerts();toggleForm();}
function removeAlert(id){firedIds.delete(id);alerts=alerts.filter(function(a){return a.id!==id;});saveAlerts();renderAlerts();}
function resetAlert(id){firedIds.delete(id);alerts=alerts.map(function(a){return a.id===id?Object.assign({},a,{fired:false}):a;});saveAlerts();renderAlerts();}
function renderAlerts(){
  var active=alerts.filter(function(a){return!a.fired;}).length;
  document.getElementById("alert-count").textContent="監控中 "+active+" / "+alerts.length;
  var b=document.getElementById("alert-badge");b.textContent=active;b.style.display=active>0?"inline":"none";
  if(!alerts.length){document.getElementById("alert-list").innerHTML="<div style='text-align:center;color:#aab8cc;padding:48px 0;line-height:2.5'>尚無警報<br><span style='font-size:11px'>點擊「新增警報」開始監控</span></div>";return;}
  document.getElementById("alert-list").innerHTML=alerts.map(function(al){
    var ci=coins.find(function(c){return c.sym===al.sym;})||{sym:al.sym,name:""};
    var ti=AT.find(function(t){return t.id===al.type;})||{label:al.type,unit:"",color:"#2255cc"};
    var key=al.sym+"_"+(al.tf||"1D");
    var p=prices[al.sym];
    var curV=al.type.startsWith("rsi")?rsiCache[key]:al.type.startsWith("adx")?(adxCache[key]?adxCache[key].adx:null):(p?p.price:null);
    var curTxt=curV!=null?(al.type.startsWith("price")?fp(curV):curV):"計算中…";
    var tfB=al.tf?'<span style="font-size:10px;color:#2255cc;background:#eef2ff;border:1px solid #c0ccee;padding:1px 8px;border-radius:10px">'+al.tf+'</span>':"";
    var firedB=al.fired?'<span style="font-size:10px;background:#fef0f0;color:#cc2233;padding:1px 8px;border-radius:10px;border:1px solid #f0c0c4">✓ 已觸發</span>':"";
    var resetB=al.fired?'<button class="btn" onclick="resetAlert('+al.id+')" style="background:#eef2ff;color:#2255cc;border:1px solid #c0ccee;padding:5px 12px">重設</button>':"";
    return'<div class="alert-row fadein" style="border-left:3px solid '+(al.fired?"#e8445a":ti.color)+';background:'+(al.fired?"#fef8f8":"#fff")+'"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="color:#1a2233;font-weight:600;font-size:14px">'+ci.sym+'</span><span style="font-size:11px;color:#7a8aaa">'+ti.label+'</span><span style="color:'+ti.color+';font-weight:700;font-size:14px">'+al.value+ti.unit+'</span>'+tfB+firedB+'</div><div style="font-size:11px;color:#7a8aaa;margin-top:4px">目前值：<strong style="color:#1a2233">'+curTxt+'</strong></div></div><div style="display:flex;gap:6px;flex-shrink:0">'+resetB+'<button class="btn" onclick="removeAlert('+al.id+')" style="background:#fef0f0;color:#e8445a;border:1px solid #f0c0c4;padding:5px 12px">✕</button></div></div>';
  }).join("");
}
function clearLog(){log=[];saveLog();renderLog();}
function renderLog(){var b=document.getElementById("log-badge");b.textContent=log.length;b.style.display=log.length>0?"inline":"none";document.getElementById("log-count").textContent="觸發記錄（"+log.length+" 筆）";if(!log.length){document.getElementById("log-list").innerHTML="<div style='text-align:center;color:#aab8cc;padding:48px 0'>尚無觸發記錄</div>";return;}document.getElementById("log-list").innerHTML=log.map(function(e){return'<div class="log-row fadein" style="border-left:3px solid '+e.color+'"><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="color:#1a2233;font-weight:700">'+e.sym+'</span><span style="font-size:11px;color:#7a8aaa">'+e.label+'</span><span style="color:'+e.color+';font-weight:700">'+e.value+e.unit+'</span>'+(e.tf?'<span style="font-size:10px;color:#2255cc;background:#eef2ff;padding:1px 8px;border-radius:10px">'+e.tf+'</span>':"")+'</div><div style="font-size:11px;color:#7a8aaa">觸發值：<strong style="color:#1a2233">'+e.curVal+'</strong></div></div><span style="font-size:10px;color:#aab8cc;white-space:nowrap;margin-top:2px">'+e.time+'</span></div>';}).join("");}

function checkAlerts(){
  if(!Object.keys(prices).length)return;
  var changed=false;
  alerts.forEach(function(al){
    if(firedIds.has(al.id))return;
    var p=prices[al.sym];
    var key=al.sym+"_"+(al.tf||"1D");
    var rsi=rsiCache[key],adxD=adxCache[key];
    if(!p)return;
    var val=parseFloat(al.value),hit=false,curVal=null;
    if(al.type==="price_above"&&p.price>=val){hit=true;curVal=fp(p.price);}
    if(al.type==="price_below"&&p.price<=val){hit=true;curVal=fp(p.price);}
    if(al.type==="price_change_up"&&p.change24h>=val){hit=true;curVal=fpct(p.change24h);}
    if(al.type==="price_change_down"&&p.change24h<=-val){hit=true;curVal=fpct(p.change24h);}
    if(al.type==="rsi_above"&&rsi!=null&&rsi>=val){hit=true;curVal=rsi;}
    if(al.type==="rsi_below"&&rsi!=null&&rsi<=val){hit=true;curVal=rsi;}
    if(al.type==="adx_above"&&adxD&&adxD.adx>=val){hit=true;curVal=adxD.adx;}
    if(al.type==="adx_below"&&adxD&&adxD.adx<=val){hit=true;curVal=adxD.adx;}
    if(!hit)return;
    firedIds.add(al.id);al.fired=true;changed=true;
    var ci=coins.find(function(c){return c.sym===al.sym;})||{sym:al.sym};
    var ti=AT.find(function(t){return t.id===al.type;})||{label:al.type,unit:"",color:"#2255cc"};
    var tfLabel=al.tf?"（"+al.tf+" K線）":"";
    var msg="🔔 加密貨幣警報觸發！\n幣種："+ci.sym+"\n條件："+ti.label+" "+al.value+ti.unit+tfLabel+"\n目前值："+curVal+"\n時間："+new Date().toLocaleString("zh-TW",{timeZone:"Asia/Taipei"});
    log.unshift({id:Date.now(),sym:ci.sym,label:ti.label,value:al.value,unit:ti.unit,tf:al.tf,curVal:curVal,time:new Date().toLocaleTimeString("zh-TW"),color:ti.color});
    if(log.length>30)log=log.slice(0,30);
    beep(al.type.indexOf("below")>=0?660:920,0.7);
    sendLine(msg).catch(function(){});
  });
  if(changed){saveAlerts();saveLog();renderAlerts();renderLog();}
}

async function fetchPrices(){
  try{
    var syms=coins.map(function(c){return c.sym;}).join(",");
    // 【更新】使用 fsyms 與 tsyms 符合 CryptoCompare API
    var r=await fetch(PROXY+"/prices?fsyms="+syms+"&tsyms=USD");
    var data=await r.json();
    if(data.RAW){
      Object.keys(data.RAW).forEach(function(sym){
        var d=data.RAW[sym].USD;
        if(d) prices[sym]={price:d.PRICE,change24h:d.CHANGEPCT24HOUR,vol24h:d.TOTALVOLUME24HTO};
      });
    }
    document.getElementById("sync-badge").textContent=new Date().toLocaleTimeString("zh-TW")+" 更新";
    renderMarket();checkAlerts();renderAlerts();
  }catch(e){document.getElementById("sync-badge").innerHTML="<span class='blink'>更新失敗</span>";}
}

async function fetchKlines(sym,tf){
  var key=sym+"_"+tf;
  try{
    // 【更新】將 tf 轉換為 CryptoCompare 支援的參數，並改呼叫 /ohlc 路由
    var type="histohour", aggregate=1;
    if(tf==="4H"){ type="histohour"; aggregate=4; }
    if(tf==="1D"){ type="histoday"; aggregate=1; }
    
    var r=await fetch(PROXY+"/ohlc?fsym="+sym+"&tsym=USD&limit=120&type="+type+"&aggregate="+aggregate);
    var res=await r.json();
    var data = res.Data && res.Data.Data ? res.Data.Data : [];
    
    if(!Array.isArray(data)||data.length<30)return;
    
    var closes=data.map(function(k){return k.close;});
    var ohlc=data.map(function(k){return[k.open,k.high,k.low,k.close];});
    
    rsiCache[key]=calcRSI(closes,14);
    var adx=calcADX(ohlc,14);if(adx)adxCache[key]=adx;
    
    renderMarket();checkAlerts();renderAlerts();
  }catch(e){}
}

function refreshAll(){
  fetchPrices();
  coins.forEach(function(c){
    fetchKlines(c.sym,"1H");
    fetchKlines(c.sym,"4H");
    fetchKlines(c.sym,"1D");
  });
}

renderCoinList();renderAlertFormCoins();renderAlerts();renderLog();updateFormHint();
refreshAll();
setInterval(fetchPrices,30000);
setInterval(function(){coins.forEach(function(c){fetchKlines(c.sym,"1H");fetchKlines(c.sym,"4H");fetchKlines(c.sym,"1D");});},5*60000);

</script>
